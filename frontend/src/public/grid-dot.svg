<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <!-- Trace lines -->
  <line x1="0"  y1="40" x2="30" y2="40" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="50" y1="40" x2="80" y2="40" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="40" y1="0"  x2="40" y2="30" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="40" y1="50" x2="40" y2="80" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>

  <!-- Corner elbow joints (quarter circles) -->
  <path d="M30,40 Q40,40 40,30" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <path d="M50,40 Q40,40 40,50" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>

  <!-- Center node dot -->
  <circle cx="40" cy="40" r="2" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <circle cx="40" cy="40" r="0.8" fill="rgba(34,211,238,0.35)"/>

  <!-- Corner micro-dots (where traces from adjacent tiles connect) -->
  <circle cx="0"  cy="40" r="1" fill="rgba(34,211,238,0.15)"/>
  <circle cx="80" cy="40" r="1" fill="rgba(34,211,238,0.15)"/>
  <circle cx="40" cy="0"  r="1" fill="rgba(34,211,238,0.15)"/>
  <circle cx="40" cy="80" r="1" fill="rgba(34,211,238,0.15)"/>
</svg>
